#
## ----- Route 1a: /user/** -> existing backend (8080) -----
#spring.cloud.gateway.server.webflux.routes[1].id=user-route
#spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8080
#spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/user/**
