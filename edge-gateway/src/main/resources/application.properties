## ----- Route 1b: /pincode/** -> existing backend (8080) -----
#spring.cloud.gateway.server.webflux.routes[2].id=pincode-route
#spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8080
#spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/pincode/**



spring.application.name=edge-gateway
server.port=8088

# Global default filter (optional)
spring.cloud.gateway.server.webflux.default-filters[0]=AddResponseHeader=X-Gateway,edge-gateway

# ---- Route 0: /users -> backend 8080 ----
spring.cloud.gateway.server.webflux.routes[0].id=users-list-route
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users

# ---- Route 1: /user/** -> backend 8080 ----
spring.cloud.gateway.server.webflux.routes[1].id=user-route
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/user/**

# ---- Route 2: /*/verify-pincode -> backend 8080 ----
spring.cloud.gateway.server.webflux.routes[2].id=verify-pincode-route
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/user/*/verify-pincode




# ---- Route 3: /postal/** -> postal-fetcher at 9090 ----
spring.cloud.gateway.server.webflux.routes[3].id=postal-route
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:9090
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/postal/**

# Gateway CORS configuration
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ---- Route 4: /auth/** -> backend 8080 ----
spring.cloud.gateway.server.webflux.routes[4].id=auth-login-route
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/auth/**
# This filter ensures only ONE CORS header is sent to the browser
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials